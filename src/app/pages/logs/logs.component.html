<!-- src/app/pages/logs/logs.component.html -->
<div class="page">
  <div class="head">
    <div>
      <div class="title">Logs de Claims</div>
      <div class="subtitle">
        Registros de quem reivindicou eventos.
      </div>
    </div>

    <div class="meta">
      @if (loading()) {
        <ui-spinner [size]="14" text="Carregando..." />
      } @else {
        <span class="count">({{ total() }})</span>
      }
    </div>
  </div>

  <div class="toolbar">
    <div class="tabs">
      <button type="button" class="tab" [class.active]="tab() === 'all'" (click)="tab.set('all')">
        Todos
      </button>
      <button type="button" class="tab" [class.active]="tab() === 'active'" (click)="tab.set('active')">
        Ativos
      </button>
      <button type="button" class="tab" [class.active]="tab() === 'reversed'" (click)="tab.set('reversed')">
        Revertidos
      </button>
    </div>
  </div>

  @if (error()) {
    <div class="error">
      {{ error() }}
      <button class="retry" type="button" (click)="load()">tentar novamente</button>
    </div>
  } @else {
    <div class="grid-wrap">
      <app-data-table [rowData]="filtered()" [config]="tableConfig" />
    </div>
  }
</div>
