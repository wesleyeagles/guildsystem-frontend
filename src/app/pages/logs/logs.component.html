<!-- src/app/pages/logs/logs.component.html -->
<div class="page">
  <div class="head">
    <div>
      <div class="title">{{ 'logs.claimsTitle' | transloco }}</div>
      <div class="subtitle">
        {{ 'logs.subtitle' | transloco }}
      </div>
    </div>

    <div class="meta">
      @if (loading()) {
        <ui-spinner [size]="14" [text]="'spinner.loading' | transloco" />
      } @else {
        <span class="count">({{ total() }})</span>
      }
    </div>
  </div>

  <div class="toolbar">
    <div class="tabs">
      <button type="button" class="tab" [class.active]="tab() === 'all'" (click)="tab.set('all')">
        {{ 'logs.tabAll' | transloco }}
      </button>
      <button type="button" class="tab" [class.active]="tab() === 'active'" (click)="tab.set('active')">
        {{ 'logs.tabActive' | transloco }}
      </button>
      <button type="button" class="tab" [class.active]="tab() === 'reversed'" (click)="tab.set('reversed')">
        {{ 'logs.tabReversed' | transloco }}
      </button>
    </div>
  </div>

  @if (error()) {
    <div class="error">
      {{ error() }}
      <button class="retry" type="button" (click)="load()">{{ 'common.retryShort' | transloco }}</button>
    </div>
  } @else {
    <div class="grid-wrap">
      <app-data-table [rowData]="filtered()" [config]="tableConfig" />
    </div>
  }
</div>
