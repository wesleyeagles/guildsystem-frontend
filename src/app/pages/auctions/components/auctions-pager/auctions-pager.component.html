<div class="flex items-center gap-2">
  <app-button text="Anterior" (click)="prev.emit()" [disabled]="page <= 1">
  </app-button>

  <div class="text-xs text-[var(--muted)] whitespace-nowrap">
    Página <span class="text-[var(--text)]">{{ page }}</span> / {{ totalPages }}
  </div>

  <app-button text="Próximo" (click)="next.emit()" [disabled]="page >= totalPages">
  </app-button>
</div>
