<div class="flex flex-wrap items-center gap-2">
  <div class="ml-auto flex items-center gap-2 w-full sm:w-auto">
    <input
      class="w-full sm:w-96 max-w-full px-3 py-2 rounded-xl bg-slate-900 border border-slate-800 text-slate-100 outline-none focus:border-indigo-500"
      placeholder="Buscar por nome, code, cast, effects, valores..." [value]="query"
      (input)="onQuery(($any($event.target).value ?? '').toString())" />
  </div>
</div>
