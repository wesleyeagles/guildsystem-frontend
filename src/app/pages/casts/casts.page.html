<div class="space-y-2">
  <div class="flex items-center justify-between">

    <div class="text-xl font-semibold">{{ 'casts.pageTitle' | transloco }}</div>


    <app-casts-toolbar [tabs]="typeTabs" [selected]="selectedType()" [query]="q()"
      [countByType]="countByType.bind(this)" (typeChange)="onChangeType($event)"
      (queryChange)="onChangeQuery($event)" />
  </div>



  <div class="rounded-2xl border border-slate-800 bg-slate-950/60 overflow-hidden">
    <div class="p-4 border-b border-slate-800 flex items-center justify-between gap-3">
      <div class="text-sm text-slate-300">
        @if (loading()) {
          {{ 'spinner.loading' | transloco }}
        } @else {
          {{ 'common.recordsCount' | transloco: { count: filtered().length } }}
        }
      </div>

      <!-- Paginação -->
      <app-casts-pager [page]="page()" [totalPages]="totalPages()" [pageSize]="pageSize()" [pageSizes]="pageSizes"
        (pageSizeChange)="onChangePageSize($event)" (prev)="prevPage()" (next)="nextPage()" />
    </div>

    @if (error()) {
    <div class="p-4 text-red-300">
      {{ error() }}
      <button class="ml-2 underline" (click)="load()">{{ 'common.retryShort' | transloco }}</button>
    </div>
    } @else {
    <app-casts-table [items]="paged()" [isEmpty]="!loading() && filtered().length === 0"
      (enterDetails)="openTip($event.ev, $event.item)" (leaveDetails)="scheduleCloseTip()" />
    }
  </div>

  <!-- Tooltip -->
  @if (tipCast()) {
  <app-cast-tooltip [cast]="tipCast()!" [pos]="tipPos()" (mouseEnter)="cancelCloseTip()"
    (mouseLeave)="scheduleCloseTip()" />
  }
</div>
