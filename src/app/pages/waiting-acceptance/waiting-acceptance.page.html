<div class="theme-fab">
  <button
    type="button"
    class="theme-fab__btn"
    (click)="theme.toggle()"
    [attr.aria-label]="
      theme.mode() === 'dark' ? ('theme.ariaLight' | transloco) : ('theme.ariaDark' | transloco)
    "
  >
    {{ theme.mode() === 'dark' ? '☀️' : '🌙' }}
  </button>
</div>

<div class="shell">
  <div class="card">
    <h1>{{ 'waiting.title' | transloco }}</h1>

    <p>
      {{ 'waiting.body1' | transloco }}
    </p>

    <p class="text-sm">{{ 'waiting.body2' | transloco }}</p>

    <a routerLink="/login" class="link">{{ 'waiting.backLogin' | transloco }}</a>
  </div>
</div>
