<div class="theme-fab">
  <button
    type="button"
    class="theme-fab__btn"
    (click)="theme.toggle()"
    [attr.aria-label]="theme.mode() === 'dark' ? 'Tema claro' : 'Tema escuro'"
  >
    {{ theme.mode() === 'dark' ? '☀️' : '🌙' }}
  </button>
</div>

<div class="shell">
  <div class="card">
    <h1>Cadastro enviado</h1>

    <p>
      Sua conta foi criada com sucesso, mas ainda precisa ser <b>aceita por um administrador</b>.
    </p>

    <p class="text-sm">Assim que for aprovada, você poderá fazer login normalmente.</p>

    <a routerLink="/login" class="link">Voltar para login</a>
  </div>
</div>
