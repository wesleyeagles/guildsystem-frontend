<div class="flex flex-wrap items-center gap-2">
  <div class="ml-auto flex items-center gap-2 w-full sm:w-auto">
    <input
      class="input-app w-full sm:w-96 max-w-full"
      placeholder="Buscar por nome, code, cast, effects, valores..."

      (input)="onQuery(($any($event.target).value ?? '').toString())"
    />

</div>
