<div class="shell">
  <div class="card">
    <div class="title">Conectando com Discord</div>

    @if (!error) {
      <div class="muted">Aguarde um instante...</div>
    } @else {
      <div class="err">{{ error }}</div>

      <div class="actions">
        <button type="button" class="btn-primary" (click)="retry()" [disabled]="rateLimited">Tentar de novo</button>
        <a class="btn-ghost" routerLink="/login">Voltar pro login</a>
      </div>
    }
  </div>
</div>
