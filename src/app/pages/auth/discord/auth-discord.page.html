<div class="shell">
  <div class="card">
    <div class="title">{{ 'authDiscord.title' | transloco }}</div>

    @if (!error) {
      <div class="muted">{{ 'authDiscord.wait' | transloco }}</div>
    } @else {
      <div class="err">{{ error }}</div>

      <div class="actions">
        <button type="button" class="btn-primary" (click)="retry()" [disabled]="rateLimited">{{ 'authDiscord.retry' | transloco }}</button>
        <a class="btn-ghost" routerLink="/login">{{ 'authDiscord.backLogin' | transloco }}</a>
      </div>
    }
  </div>
</div>
