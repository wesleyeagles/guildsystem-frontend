<div class="page">
  <div class="header">
    <div class="title">
      <div class="text-xl font-semibold">{{ 'permissions.title' | transloco }}</div>
      <div class="text-sm text-slate-400">{{ 'permissions.subtitle' | transloco }}</div>
      <div class="text-xs text-slate-500 mt-1">
        {{ 'permissions.you' | transloco }} <b class="text-slate-200">{{ me()?.nickname }}</b>
        · {{ 'permissions.scope' | transloco }} <b class="text-slate-200">{{ myScope() }}</b>
      </div>
    </div>
  </div>

  @if (error()) {
    <div class="error">
      {{ error() }}
      <button class="error__retry" type="button" (click)="load()">{{ 'common.retryShort' | transloco }}</button>
    </div>
  } @else {
    <div class="grid-wrap">
      <app-data-table [rowData]="list()" [config]="tableConfig" />
    </div>
  }
</div>
