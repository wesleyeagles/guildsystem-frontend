<div class="page">
  <div class="head">
    <div>
      <div class="title">Membros pendentes</div>
      <div class="subtitle">Aceite os usuários que se registraram e ainda não foram aprovados.</div>
    </div>
  </div>

  <div>
    @if (error()) {
      <div class="error">
        {{ error() }}
        <button class="error__retry" type="button" (click)="load()">tentar novamente</button>
      </div>
    } @else {
      <div class="grid-wrap">
        <app-data-table [rowData]="list()" [config]="tableConfig" />
      </div>
    }
  </div>
</div>
