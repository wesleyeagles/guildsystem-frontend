<div class="min-h-screen bg-slate-950 text-slate-100 flex items-center justify-center p-6">
  <div class="w-full flex flex-col justify-center items-center">
    <div class="flex flex-col items-center mb-5">
      <div class="w-20 h-20 rounded-full overflow-hidden border border-slate-800 bg-slate-900/40 shadow-xl">
        <img src="/logo.png" alt="Logo" class="w-full h-full object-cover" />
      </div>
    </div>

    <div class="w-[520px] bg-slate-900/40 border border-slate-800 rounded-2xl p-6">
      <div>
        <button
          type="button"
          class="w-full px-3 py-2 rounded-md transition font-bold text-[#0F172A] bg-[#00FEFF] hover:bg-[#000] hover:text-[#00FEFF] disabled:bg-[#24314E] disabled:pointer-events-none disabled:text-[#94A3B8]"
          (click)="loginWithDiscord()"
          [disabled]="loading || discordLoading"
        >
          {{ discordLoading ? 'Abrindo Discord...' : 'Entrar com Discord' }}
        </button>
      </div>

      @if (error) {
      <div class="mt-4 text-sm text-red-300">{{ error }}</div>
      }
    </div>
  </div>
</div>
