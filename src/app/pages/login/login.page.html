<div class="theme-fab">
  <button
    type="button"
    class="theme-fab__btn"
    (click)="theme.toggle()"
    [attr.aria-label]="
      theme.mode() === 'dark' ? ('theme.ariaLight' | transloco) : ('theme.ariaDark' | transloco)
    "
  >
    {{ theme.mode() === 'dark' ? '☀️' : '🌙' }}
  </button>
</div>

<div class="wrap">
  <div class="card">
    <header class="card__head">
      <div class="logo-wrap">
        <img src="/logo.png" [attr.alt]="'login.logoAlt' | transloco" />
      </div>
      <h1 class="card__title">{{ 'login.title' | transloco }}</h1>
      <p class="card__sub">{{ 'login.subtitle' | transloco }}</p>
    </header>

    <div class="card__body">
      <button
        type="button"
        class="btn-discord"
        (click)="loginWithDiscord()"
        [disabled]="loading || discordLoading"
      >
        {{ discordLoading ? ('login.openingDiscord' | transloco) : ('login.withDiscord' | transloco) }}
      </button>

      @if (error) {
        <div class="err" role="alert">{{ error }}</div>
      }

      <p class="footer">{{ 'login.footer' | transloco }}</p>
    </div>
  </div>
</div>
