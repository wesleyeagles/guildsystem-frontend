<div class="space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <div class="text-xl font-semibold">Helmets</div>
      <div class="text-sm text-slate-400">Tabela enxuta + tooltip completo</div>
    </div>

    <button
      class="px-4 py-2 rounded-xl bg-slate-900 hover:bg-slate-800 border border-slate-800 text-slate-200"
      (click)="load()"
    >
      Atualizar
    </button>
  </div>

  <app-helmets-toolbar [query]="q()" (queryChange)="onChangeQuery($event)" />

  <div class="rounded-2xl border border-slate-800 bg-slate-950/60 overflow-hidden">
    <div class="p-4 border-b border-slate-800 flex items-center justify-between gap-3">
      <div class="text-sm text-slate-300">
        @if (loading()) { Carregando... } @else { {{ filtered().length }} registro(s) }
      </div>

      <app-casts-pager
        [page]="page()"
        [totalPages]="totalPages()"
        [pageSize]="pageSize()"
        [pageSizes]="pageSizes"
        (pageSizeChange)="onChangePageSize($event)"
        (prev)="prevPage()"
        (next)="nextPage()"
      />
    </div>

    @if (error()) {
      <div class="p-4 text-red-300">
        {{ error() }}
        <button class="ml-2 underline" (click)="load()">tentar novamente</button>
      </div>
    } @else {
      <app-helmets-table
        [items]="paged()"
        [isEmpty]="!loading() && filtered().length === 0"
        (enterDetails)="openTip($event.ev, $event.item)"
        (leaveDetails)="scheduleCloseTip()"
      />
    }
  </div>

  @if (tipHelmet()) {
    <app-helmet-tooltip
      [helmet]="tipHelmet()!"
      [pos]="tipPos()"
      (mouseEnter)="cancelCloseTip()"
      (mouseLeave)="scheduleCloseTip()"
    />
  }
</div>
