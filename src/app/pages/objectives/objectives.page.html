<section class="create">
  <div class="create__head">
    <h2>{{ 'objectives.formTitle' | transloco }}</h2>
  </div>

  <form class="create__form" [formGroup]="createForm" (ngSubmit)="createDefinition()">
    <label class="f">
      <span>{{ 'home.fieldTitle' | transloco }}</span>
      <input type="text" formControlName="title" [placeholder]="'objectives.titlePh' | transloco" />

      <small class="err-slot">
        @if (createForm.controls.title.touched && createForm.controls.title.invalid) {
        <span class="err">{{ 'objectives.errTitle' | transloco }}</span>
        } @else {
        <span class="err err--ghost">.</span>
        }
      </small>
    </label>

    <label class="f">
      <span>{{ 'objectives.points' | transloco }}</span>
      <input type="number" formControlName="points" min="0" />

      <small class="err-slot">
        @if (createForm.controls.points.touched && createForm.controls.points.invalid) {
        <span class="err">{{ 'objectives.errPoints' | transloco }}</span>
        } @else {
        <span class="err err--ghost">.</span>
        }
      </small>
    </label>

    <label class="f">
      <span>{{ 'objectives.category' | transloco }}</span>
      <select formControlName="category">
        @for (c of categories; track c) {
        <option [value]="c">{{ c }}</option>
        }
      </select>

      <small class="err-slot">
        @if (createForm.controls.category.touched && createForm.controls.category.invalid) {
        <span class="err">{{ 'objectives.errCategory' | transloco }}</span>
        } @else {
        <span class="err err--ghost">.</span>
        }
      </small>
    </label>

    <label class="f f--check">
      <input type="checkbox" formControlName="isActive" />
      <span>{{ 'objectives.activeLabel' | transloco }}</span>

      <small class="err-slot">
        <span class="err err--ghost">.</span>
      </small>
    </label>

    <button class="btn btn--teal create__submit" type="submit" [disabled]="createForm.invalid || creating">
      {{ creating ? ('common.creating' | transloco) : ('objectives.submit' | transloco) }}
    </button>
  </form>
</section>

<div class="grid-table">
  <app-data-table [rowData]="definitions" [config]="tableConfig" />
</div>
