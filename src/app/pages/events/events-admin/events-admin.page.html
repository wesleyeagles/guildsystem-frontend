<section class="create">
  <div class="create__head">
    <h2>{{ 'eventsAdmin.formTitle' | transloco }}</h2>
  </div>

  <form class="create__form" [formGroup]="createForm" (ngSubmit)="createEvent()">
    <label class="f">
      <span>{{ 'eventsAdmin.labelObjective' | transloco }}</span>
      <select formControlName="definitionCode">
        @for (d of definitions; track d.code) {
        <option [value]="d.code">{{ d.title }}</option>
        }
      </select>
    </label>

    <label class="f">
      <span>{{ 'eventsAdmin.labelPassword' | transloco }}</span>
      <input type="password" formControlName="password" [placeholder]="'eventToast.passwordPh' | transloco" />
    </label>

    <label class="f">
      <span>{{ 'eventsAdmin.labelDuration' | transloco }}</span>
      <select formControlName="durationMinutes">
        <option value="5">5 min</option>
        <option value="10">10 min</option>
        <option value="15">15 min</option>
        <option value="30">30 min</option>
        <option value="45">45 min</option>
        <option value="60">60 min</option>
      </select>
    </label>

    @if (createForm.controls.allowPilot.value) {
    <label class="f">
      <span>{{ 'eventsAdmin.pilotBonusLabel' | transloco }}</span>
      <input type="number" min="1" step="1" formControlName="pilotBonusPoints" placeholder="Ex: 10" />
      @if (createForm.controls.pilotBonusPoints.touched && createForm.controls.pilotBonusPoints.invalid) {
      <small class="err">{{ 'eventsAdmin.pilotMinErr' | transloco }}</small>
      }
    </label>
    }

    <div class="checkboxes"><label class="f f--check">
        <input type="checkbox" formControlName="isDoubled" />
        <span>{{ 'eventsAdmin.doubled' | transloco }}</span>
      </label>

      <!-- ✅ NOVO -->
      <label class="f f--check">
        <input type="checkbox" formControlName="allowPilot" />
        <span>{{ 'eventsAdmin.allowPilotLabel' | transloco }}</span>
      </label>
    </div>

    <button class="btn btn--teal create__submit" type="submit" [disabled]="createForm.invalid || creating">
      {{ creating ? ('eventsAdmin.creating' | transloco) : ('eventsAdmin.submit' | transloco) }}
    </button>
  </form>
</section>

<div class="table-grid">
  <app-data-table [rowData]="events" [config]="tableConfig" [loading]="eventsLoading()" />
</div>
