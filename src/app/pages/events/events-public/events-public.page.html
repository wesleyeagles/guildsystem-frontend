<div class="page">
  <div class="head">
    <div>
      <div class="title">Eventos</div>
      <div class="subtitle">
        Veja eventos ativos e faça claim com a senha. Finalizados e cancelados também ficam listados.
      </div>
    </div>

    <div class="meta">
      @if (loading()) {
        <ui-spinner [size]="14" text="Carregando..." />
      } @else {
        <span class="count">({{ filtered().length }})</span>
      }
    </div>
  </div>

  @if (error()) {
    <div class="error">
      {{ error() }}
      <button class="retry" type="button" (click)="load()">tentar novamente</button>
    </div>
  } @else {
    <div class="grid-wrap">
      <app-data-table [rowData]="filtered()" [config]="tableConfig" />
    </div>
  }
</div>
