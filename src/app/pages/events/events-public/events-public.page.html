<div class="page">
  <div class="head">
    <div>
      <div class="title">{{ 'eventsPublic.title' | transloco }}</div>
      <div class="subtitle">
        {{ 'eventsPublic.subtitle' | transloco }}
      </div>
    </div>

    <div class="meta">
      @if (loading()) {
        <ui-spinner [size]="14" [text]="'spinner.loading' | transloco" />
      } @else {
        <span class="count">({{ filtered().length }})</span>
      }
    </div>
  </div>

  @if (error()) {
    <div class="error">
      {{ error() }}
      <button class="retry" type="button" (click)="load()">{{ 'common.retryShort' | transloco }}</button>
    </div>
  } @else {
    <div class="grid-wrap">
      <app-data-table [rowData]="filtered()" [config]="tableConfig" [loading]="loading()" />
    </div>
  }
</div>
