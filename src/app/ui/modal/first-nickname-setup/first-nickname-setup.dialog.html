<div class="dialog">
  <div class="dialog__header">
    <h2>Confirme seu nickname no site</h2>
  </div>

  <div class="dialog__intro">
    <p>
      Usamos o nome do Discord como sugestão inicial. Confirme se quer manter este nickname no sistema ou
      escolha outro — o nome do site pode ser diferente do Discord.
    </p>
  </div>

  <form class="form" [formGroup]="form" (ngSubmit)="submit()">
    <label class="f">
      <span>Nickname no site</span>
      <input type="text" formControlName="nickname" placeholder="Seu nickname" autocomplete="nickname" />
      @if (form.controls.nickname.touched && form.controls.nickname.invalid) {
        <small class="err">Informe um nickname.</small>
      }
    </label>

    <div class="actions">
      <button class="btn btn--teal" type="submit" [disabled]="form.invalid || loading">
        {{ loading ? 'Salvando...' : 'Confirmar e continuar' }}
      </button>
    </div>
  </form>
</div>
