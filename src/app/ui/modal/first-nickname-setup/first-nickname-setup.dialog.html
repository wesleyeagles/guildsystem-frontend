<div class="dialog">
  <div class="dialog__header">
    <h2>{{ 'firstSetup.title' | transloco }}</h2>
  </div>

  <div class="dialog__intro">
    <p>
      {{ 'firstSetup.intro' | transloco }}
    </p>
  </div>

  <form class="form" [formGroup]="form" (ngSubmit)="submit()">
    <label class="f">
      <span>{{ 'firstSetup.nicknameLabel' | transloco }}</span>
      <input
        type="text"
        formControlName="nickname"
        [placeholder]="'firstSetup.nicknamePh' | transloco"
        autocomplete="nickname"
      />
      @if (form.controls.nickname.touched && form.controls.nickname.invalid) {
        <small class="err">{{ 'firstSetup.nicknameErr' | transloco }}</small>
      }
    </label>

    <label class="f">
      <span>{{ 'gameClass.label' | transloco }}</span>
      <app-character-class-picker formControlName="characterClass" />
      @if (form.controls.characterClass.touched && form.controls.characterClass.invalid) {
        <small class="err">{{ 'firstSetup.classErr' | transloco }}</small>
      }
    </label>

    <div class="actions">
      <button class="btn btn--teal" type="submit" [disabled]="form.invalid || loading">
        {{ loading ? ('common.saving' | transloco) : ('firstSetup.submit' | transloco) }}
      </button>
    </div>
  </form>
</div>
