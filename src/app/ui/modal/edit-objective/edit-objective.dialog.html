<div class="dialog">
  <div class="dialog__header">
    <h2>Editar objetivo</h2>
    <button class="icon-btn" type="button" (click)="close()" aria-label="Fechar">✕</button>
  </div>

  <div class="meta">
    <span class="code">Código: <b>{{ def.code }}</b></span>
  </div>

  <form class="form" [formGroup]="form" (ngSubmit)="save()">
    <label class="f">
      <span>Título</span>
      <input type="text" formControlName="title" />
    </label>

    <label class="f">
      <span>Pontos</span>
      <input type="number" formControlName="points" min="0" />
    </label>

    <label class="f">
      <span>Categoria</span>
      <select formControlName="category">
        @for (c of categories; track c) {
          <option [value]="c">{{ c }}</option>
        }
      </select>
    </label>

    <label class="check">
      <input type="checkbox" formControlName="isActive" />
      <span>Ativo</span>
    </label>

    <div class="actions">
      <button class="btn btn--ghost" type="button" (click)="close()">Cancelar</button>
      <button class="btn btn--teal" type="submit" [disabled]="form.invalid || saving">
        {{ saving ? 'Salvando...' : 'Salvar' }}
      </button>
    </div>
  </form>
</div>
