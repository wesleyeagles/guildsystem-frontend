<div class="dialog">
  <div class="dialog__header">
    <h2>{{ 'createDonation.title' | transloco }}</h2>
    <button class="icon-btn" type="button" (click)="close()" [attr.aria-label]="'createDonation.closeAria' | transloco">✕</button>
  </div>

  <form class="form" [formGroup]="form" (ngSubmit)="submit()">
    <p class="form__hint">{{ 'createDonation.hint' | transloco }}</p>

    <div class="radio-group" role="radiogroup" [attr.aria-label]="'createDonation.amountAria' | transloco">
      @for (opt of options; track opt.amount) {
        <label class="radio-option" [class.radio-option--selected]="form.controls.amount.value === opt.amount">
          <input
            type="radio"
            [value]="opt.amount"
            formControlName="amount"
            [attr.aria-label]="'createDonation.radioAria' | transloco: { label: opt.label, pts: opt.points }"
          />
          <span class="radio-option__label">{{ opt.label }}</span>
          <span class="radio-option__points">+{{ opt.points }} {{ 'createDonation.pointsAbbr' | transloco }}</span>
        </label>
      }
    </div>

    @if (form.controls.amount.touched && form.controls.amount.invalid) {
      <small class="err">{{ 'createDonation.amountErr' | transloco }}</small>
    }

    <div class="actions">
      <button class="btn btn--ghost" type="button" (click)="close()">{{ 'createDonation.cancel' | transloco }}</button>
      <button class="btn btn--teal" type="submit" [disabled]="form.invalid || loading">
        {{ loading ? ('createDonation.sending' | transloco) : ('createDonation.donate' | transloco) }}
      </button>
    </div>
  </form>
</div>
