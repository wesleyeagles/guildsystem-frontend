<div class="flex items-center gap-2 flex-wrap justify-end">
    @if (canChangePageSize) {
    <span class="text-xs ui-muted">Por página</span>

    <select class="ui-select" [value]="pageSize" (change)="onChangeSize(($any($event.target).value ?? '10'))"
        aria-label="Itens por página">
        @for (s of pageSizes; track s) {
        <option [value]="s">{{ s }}</option>
        }
    </select>
    }

    <app-button text="Anterior" (clicked)="prev.emit()" [disabled]="page <= 1"></app-button>

    <div class="text-xs ui-muted whitespace-nowrap px-1">
        Página <span class="ui-strong">{{ page }}</span> / {{ totalPages }}
    </div>

    <app-button text="Próximo" (clicked)="next.emit()" [disabled]="page >= totalPages"></app-button>
</div>
