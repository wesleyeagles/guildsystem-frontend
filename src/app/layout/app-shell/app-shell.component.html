<div class="h-screen text-[var(--text)]">
    <header
        class="app-mobile-header md:hidden fixed top-0 left-0 right-0 z-[60] flex flex-col border-b border-[var(--border)] bg-[var(--sidebar-background)]"
    >
        <div class="flex h-14 items-center gap-3 px-3">
        <button
            type="button"
            class="flex h-11 w-11 shrink-0 items-center justify-center rounded-[var(--radius)] border border-[var(--border)] bg-[var(--surface-2)] text-[var(--text)] transition-[border-color,background] duration-200 hover:border-[var(--brand-border)] hover:bg-[var(--surface-3)]"
            (click)="toggleMobileNav()"
            [attr.aria-expanded]="mobileNavOpen()"
            aria-controls="app-mobile-nav"
            [attr.aria-label]="
              mobileNavOpen() ? ('shell.closeMenu' | transloco) : ('shell.openMenu' | transloco)
            "
        >
            @if (mobileNavOpen()) {
                <span class="material-icons text-[22px] leading-none" aria-hidden="true">close</span>
            } @else {
                <span class="material-icons text-[22px] leading-none" aria-hidden="true">menu</span>
            }
        </button>
        <a
            routerLink="/"
            class="flex min-w-0 flex-1 items-center gap-2.5 no-underline text-inherit"
            (click)="closeMobileNav()"
        >
            <img
                src="/logo.png"
                alt=""
                class="h-9 w-9 shrink-0 rounded-[var(--radius)] border border-[var(--border)] object-cover"
            />
            <div class="min-w-0">
                <div class="truncate text-sm font-extrabold tracking-tight text-[var(--text)]">-=BlackLisT=-</div>
                <div class="truncate text-[11px] font-medium text-[var(--muted)]">{{ 'brand.subtitle' | transloco }}</div>
            </div>
        </a>
        </div>
    </header>

    @if (mobileNavOpen()) {
        <button
            type="button"
            class="md:hidden fixed inset-0 z-40 border-0 bg-black/45 p-0 backdrop-blur-[1px]"
            [attr.aria-label]="'shell.closeMenu' | transloco"
            (click)="closeMobileNav()"
        ></button>
    }

    <app-sidebar
        id="app-mobile-nav"
        class="app-sidebar-drawer fixed left-0 bottom-0 z-50 w-64 md:top-0 md:bottom-auto md:z-20 md:h-screen"
        [class.app-sidebar-drawer--open]="mobileNavOpen()"
    />

    <div
        class="app-shell-main h-screen overflow-hidden transition-[padding] duration-200 pl-0 md:pl-60"
    >
        <main class="h-full min-h-0 overflow-auto app-main">
            <router-outlet />
        </main>
    </div>
</div>
