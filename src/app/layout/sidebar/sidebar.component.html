<aside class="w-56">
  <div class="h-full flex flex-col">
    <a class="brand-link" routerLink="/">
      <div class="brand">
        <div class="brand-logo"><img src="logo.png" /></div>
        <div class="brand-name">
          <h1>DataDidNotMatch</h1>
          <small>Guild System</small>
        </div>
      </div>
    </a>

    <a class="user-link" [routerLink]="'/members/' + user?.id">
      <div class="user">
        <div class="avatar">
          <img [src]="userAvatar" />
        </div>

        <div class="information">
          <span class="nickname">
            {{ user?.nickname }}
          </span>
          <span class="points">
            Pts: {{ user?.points }}
          </span>
        </div>
      </div>
    </a>

    @if (isAdminArea()) {
    <div class="actions">
      <button class="btn-teal" type="button" (click)="openCreateEventModal()">+ Novo evento</button>
    </div>
    }

    <div class="divider"></div>

    <nav class="links">
      <ul>
        <li>
          <app-link-component icon="home" label="Início" route="/"></app-link-component>
        </li>

        <li>
          <app-link-component icon="dashboard" label="Dashboard" route="/dashboard"></app-link-component>
        </li>

        <li>
          <app-link-component icon="group" label="Membros" route="/members"></app-link-component>
        </li>

        <li>
          <app-link-component icon="event" label="Eventos" route="/events"></app-link-component>
        </li>
        <li>
          <app-link-component icon="gavel" label="Leilões" route="/auctions"></app-link-component>
        </li>
      </ul>
    </nav>

    @if (isModeratorArea()) {
    <div class="divider"></div>

    <nav class="links">
      <ul>
        @if (isAdminArea()) {
        <li>
          <app-link-component icon="assignment-globe" label="Criar objetivo"
            route="/objectives/admin"></app-link-component>
        </li>
        }

        @if (isAdminArea()) {
        <li>
          <app-link-component icon="event_repeat" label="Criar evento" route="/events/admin"></app-link-component>
        </li>
        }

        @if (isAdminArea()) {
        <li>
          <app-link-component icon="balance" label="Criar leilão" route="/auctions/admin"></app-link-component>
        </li>
        }

        @if (isAdminArea()) {
        <li>
          <app-link-component icon="handyman" label="Criar item" route="/items/admin"></app-link-component>
        </li>
        }

        @if (isAdminArea()) {
        <li>
          <app-link-component icon="admin_panel_settings" label="Permissões"
            route="/members/permissions"></app-link-component>
        </li>
        }

        <li>
          <app-link-component icon="manage_accounts" label="Membros pendentes"
            route="/members/pending"></app-link-component>
        </li>
      </ul>
    </nav>
    }
  </div>
</aside>
