<aside
  class="fixed top-0 left-0 h-screen pt-16 border-r border-slate-800 bg-slate-950/70 backdrop-blur overflow-hidden z-20 transition-[width] duration-300 ease-in-out"
  [class.w-72]="!collapsed"
  [class.w-20]="collapsed"
>
  <div class="h-full flex flex-col">
    <div class="px-2 pt-3">
      @if (!collapsed) {
        <div class="flex items-center justify-between px-2 py-2">
          <div class="text-xs uppercase tracking-wide text-slate-500">Navegação</div>
        </div>
      } @else {
        <div class="flex items-center justify-center px-2 py-2"></div>
      }

      <nav class="space-y-2">
        <a
          routerLink="/"
          queryParamsHandling="preserve"
          routerLinkActive="bg-[#00FEFF] hover:bg-[#00FEFF] text-[#0F172A] font-bold"
          [routerLinkActiveOptions]="{ exact: true }"
          class="flex items-center rounded-md transition-colors"
          title="Início"
          aria-label="Início"
        >
          <div class="w-10 h-10 flex items-center justify-center">
            <lucide-icon [img]="HomeIcon" class="w-5 h-5"></lucide-icon>
          </div>
          <span class="whitespace-nowrap overflow-hidden transition-all duration-200">Início</span>
        </a>

        <a
          routerLink="/events"
          routerLinkActive="bg-[#00FEFF] hover:bg-[#00FEFF] text-[#0F172A] font-bold"
          [routerLinkActiveOptions]="{ exact: true }"
          class="flex items-center rounded-md transition-colors"
          title="Eventos"
          aria-label="Eventos"
        >
          <div class="w-10 h-10 flex items-center justify-center">
            <lucide-icon [img]="EventIcon" class="w-5 h-5"></lucide-icon>
          </div>
          <span class="whitespace-nowrap overflow-hidden transition-all duration-200">Eventos</span>
        </a>

        <a
          routerLink="/auctions"
          routerLinkActive="bg-[#00FEFF] hover:bg-[#00FEFF] text-[#0F172A] font-bold"
          [routerLinkActiveOptions]="{ exact: true }"
          class="flex items-center rounded-md transition-colors"
          title="Leilões"
          aria-label="Leilões"
        >
          <div class="w-10 h-10 flex items-center justify-center">
            <lucide-icon [img]="AuctionIcon" class="w-5 h-5"></lucide-icon>
          </div>
          <span class="whitespace-nowrap overflow-hidden transition-all duration-200">Leilões</span>
        </a>

        @if (isAdminArea() || canSeePendingMembers()) {
          <div class="flex my-6 border-b border-slate-600 w-[97%] mx-auto"></div>

          <div class="flex items-center justify-between px-2 py-2">
            <div class="text-xs uppercase tracking-wide text-slate-500">Administração</div>
          </div>
        }

        @if (isAdminArea()) {
          <a
            routerLink="/events/admin"
            routerLinkActive="bg-[#00FEFF] hover:bg-[#00FEFF] text-[#0F172A] font-bold"
            [routerLinkActiveOptions]="{ exact: true }"
            class="flex items-center rounded-md transition-colors"
            title="Criar Eventos"
            aria-label="Criar Eventos"
          >
            <div class="w-10 h-10 flex items-center justify-center">
              <lucide-icon [img]="EventAddIcon" class="w-5 h-5"></lucide-icon>
            </div>
            <span class="whitespace-nowrap overflow-hidden transition-all duration-200">
              Criar Eventos
            </span>
          </a>

          <a
            routerLink="/auctions/admin"
            routerLinkActive="bg-[#00FEFF] hover:bg-[#00FEFF] text-[#0F172A] font-bold"
            [routerLinkActiveOptions]="{ exact: true }"
            class="flex items-center rounded-md transition-colors"
            title="Criar Leilões"
            aria-label="Criar Leilões"
          >
            <div class="w-10 h-10 flex items-center justify-center">
              <lucide-icon [img]="AuctionAddIcon" class="w-5 h-5"></lucide-icon>
            </div>
            <span class="whitespace-nowrap overflow-hidden transition-all duration-200">
              Criar Leilões
            </span>
          </a>
        }

        @if (canSeePendingMembers()) {
          <a
            routerLink="/members/admin"
            routerLinkActive="bg-[#00FEFF] hover:bg-[#00FEFF] text-[#0F172A] font-bold"
            [routerLinkActiveOptions]="{ exact: true }"
            class="flex items-center rounded-md transition-colors"
            title="Membros Pendentes"
            aria-label="Membros Pendentes"
          >
            <div class="w-10 h-10 flex items-center justify-center">
              <lucide-icon [img]="PendencyUser" class="w-5 h-5"></lucide-icon>
            </div>

            <span class="whitespace-nowrap overflow-hidden transition-all duration-200">
              Membros Pendentes
            </span>
          </a>
        }

        @if (isAdminArea()) {
          <a
            routerLink="/members/permissions"
            routerLinkActive="bg-[#00FEFF] hover:bg-[#00FEFF] text-[#0F172A] font-bold"
            [routerLinkActiveOptions]="{ exact: true }"
            class="flex items-center rounded-md transition-colors"
            title="Permissões"
            aria-label="Permissões"
          >
            <div class="w-10 h-10 flex items-center justify-center">
              <lucide-icon [img]="PermissionsIcon" class="w-5 h-5"></lucide-icon>
            </div>

            <span class="whitespace-nowrap overflow-hidden transition-all duration-200">
              Permissões
            </span>
          </a>
        }
      </nav>
    </div>
  </div>
</aside>
