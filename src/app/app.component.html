@if (!auth.ready()) {
  <div
    class="min-h-screen w-full flex items-center justify-center overflow-hidden bg-[var(--bg)] text-[var(--text-2)]"
  >
    <div class="relative w-full max-w-lg px-6">

      <div class="flex flex-col items-center">
        <div
          class="w-20 h-20 rounded-full overflow-hidden border border-[var(--border)] bg-[var(--surface-2)] shadow-xl"
        >
          <img src="/logo.png" alt="Logo" class="w-full h-full object-cover" />
        </div>
        <div class="mt-3 text-xs uppercase tracking-[0.25em] text-[var(--muted)]">
          -=BlackLisT=- • Guild System
        </div>
      </div>

      <div
        class="mt-6 rounded-3xl border border-[var(--border)] bg-[var(--surface)]/90 backdrop-blur-xl shadow-2xl overflow-hidden"
      >
        <div
          class="flex items-center justify-between px-5 py-3 border-b border-[var(--border)] bg-[var(--surface-2)]/80"
        >
          <div class="flex items-center gap-2 text-sm font-semibold">
            <span class="statusDot"></span>
            Console do Sistema
          </div>
          <div class="text-xs text-[var(--muted)]">Release v2.0.0</div>
        </div>

        <div class="p-5 space-y-3 font-mono text-[13px] leading-relaxed">
          <div class="line l1">
            <span class="tag">[SYS]</span> Verificando credenciais<span class="cursor"></span>
          </div>
          <div class="line l2">
            <span class="tag">[SYS]</span> Sincronizando tokens<span class="cursor"></span>
          </div>
          <div class="line l3">
            <span class="tag">[SYS]</span> Conectando ao servidor<span class="cursor"></span>
          </div>
          <div class="line l4">
            <span class="tag">[OK]</span> Preparando interface<span class="cursor"></span>
          </div>

          <div
            class="mt-4 rounded-2xl border border-[var(--border)] bg-[var(--surface-2)]/80 px-4 py-3 text-[var(--text-2)]"
          >
            <div class="flex items-center gap-2">
              <span class="pulseDot"></span>
              <span>Aguardando resposta do servidor</span>
              <span class="dots"><span></span><span></span><span></span></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
} @else {
  <router-outlet />
}
