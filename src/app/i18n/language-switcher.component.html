<div
  class="lang-row"
  [class.lang-row--compact]="compact()"
  [class.lang-row--no-label]="!showLabel()"
>
  @if (showLabel()) {
    <div class="lang-label">{{ 'language.label' | transloco }}</div>
  }
  <div class="lang-buttons" role="group" [attr.aria-label]="'language.label' | transloco">
    @for (opt of langOptions; track opt.id) {
      <button
        type="button"
        class="lang-btn"
        [class.lang-btn--active]="activeLangSig() === opt.id"
        (click)="setLang(opt.id)"
        [attr.aria-label]="opt.labelKey | transloco"
        [attr.aria-pressed]="activeLangSig() === opt.id"
        [title]="opt.labelKey | transloco"
      >
        <img
          class="lang-btn__flag"
          [src]="opt.flagSrc"
          width="28"
          height="20"
          decoding="async"
          loading="lazy"
          alt=""
          aria-hidden="true"
        />
      </button>
    }
  </div>
</div>
