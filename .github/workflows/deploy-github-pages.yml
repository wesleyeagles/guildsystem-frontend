name: Deploy frontend to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "angular.json"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "tsconfig.app.json"
      - ".github/workflows/deploy-github-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          PAGES_BASE_HREF_VAR: ${{ vars.PAGES_BASE_HREF }}
        run: |
          if [ -n "$PAGES_BASE_HREF_VAR" ]; then
            BASE_HREF="$PAGES_BASE_HREF_VAR"
          else
            BASE_HREF="/${{ github.event.repository.name }}/"
          fi
          npm run build -- --base-href "$BASE_HREF"

      - name: SPA fallback (copy index.html to 404.html)
        run: cp dist/frontend/browser/index.html dist/frontend/browser/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/frontend/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
