# Cloudflare Pages (Git): Angular "application" builder outputs static files under
# dist/frontend/browser, not dist/frontend. If Pages publishes the parent folder, scripts
# resolve to /chunk-*.js (via <base href="/">) but files live at /browser/chunk-*.js —
# missing assets get SPA fallback HTML → "MIME type text/html" for module scripts.
# https://developers.cloudflare.com/pages/framework-guides/deploy-an-angular-site/

name = "guildsystem-frontend"
compatibility_date = "2024-11-01"
pages_build_output_dir = "./dist/frontend/browser"
